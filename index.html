<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STAAR Success Generator</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1b2430;
      --muted: #5f6b7a;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --border: #dbe3ee;
      --shadow: 0 14px 36px rgba(16, 24, 40, 0.08);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(circle at 15% 10%, #eef3ff 0%, rgba(238, 243, 255, 0) 40%),
        radial-gradient(circle at 85% 20%, #f2f8ff 0%, rgba(242, 248, 255, 0) 35%),
        var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 32px 16px 56px;
    }

    .container {
      width: 100%;
      max-width: 920px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 22px;
    }

    .header h1 {
      margin: 0;
      font-size: clamp(1.9rem, 2.8vw, 2.7rem);
      letter-spacing: -0.02em;
    }

    .header p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 1.9vw, 1.15rem);
      font-weight: 500;
    }

    .value-card,
    .generator-card,
    .worksheet-card,
    .print-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .value-card {
      margin: 0 auto 20px;
      padding: 18px 20px;
    }

    .value-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .value-list li {
      display: flex;
      align-items: center;
      gap: 9px;
      color: #1f3347;
      font-weight: 600;
      font-size: 0.95rem;
      padding: 10px 12px;
      background: #f8fbff;
      border: 1px solid #e5edf7;
      border-radius: 12px;
    }

    .value-list li span {
      font-size: 1.05rem;
    }

    .generator-card {
      padding: 22px;
      margin-bottom: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field label {
      font-size: 0.92rem;
      color: #344154;
      font-weight: 600;
    }

    .field select {
      width: 100%;
      appearance: none;
      border: 1px solid #cfd8e3;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      padding: 11px 12px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .field select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.16);
    }

    .subject-selector {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .subject-btn {
      border: 1px solid #cfd8e3;
      border-radius: 999px;
      background: #fff;
      color: #1e334a;
      padding: 9px 12px;
      font-size: 0.96rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      flex: 1 1 calc(50% - 8px);
      min-width: 150px;
    }

    .subject-btn:hover {
      border-color: #9ab4db;
      background: #f6f9ff;
    }

    .subject-btn.active {
      background: #eaf1ff;
      border-color: #7aa3ee;
      color: #123567;
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.14);
    }

    .generate-btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 13px 16px;
      background: linear-gradient(180deg, #2f6df2 0%, #2563eb 100%);
      color: #fff;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: transform 0.08s ease, background 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.28);
    }

    .generate-btn:hover:not(:disabled) {
      background: linear-gradient(180deg, #2a62d8 0%, #1d4ed8 100%);
      transform: translateY(-1px);
    }

    .generate-btn:disabled {
      opacity: 0.72;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .worksheet-card {
      margin-top: 0;
      padding: 26px;
      min-height: 220px;
      background: #fff;
      border-left: 4px solid #dbe8ff;
    }

    #output {
      color: #203040;
      font-size: 1rem;
    }

    .worksheet {
      font-family: Georgia, "Times New Roman", serif;
      color: #1a2433;
      line-height: 1.75;
      background: #fffcf5;
      border: 1px solid #f2ead7;
      border-radius: 12px;
      padding: 18px;
    }

    .worksheet h3 {
      margin: 24px 0 10px;
      font-size: 1.25rem;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      color: #142033;
      letter-spacing: -0.01em;
      border-bottom: 1px solid #e5ebf2;
      padding-bottom: 6px;
    }

    .worksheet h3:first-child {
      margin-top: 0;
    }

    .locked {
      text-align: center;
      background: linear-gradient(180deg, #fff8f4 0%, #fff 100%);
      border: 1px solid #ffd8c5;
      color: #8a3300;
      border-radius: 14px;
      padding: 28px 20px;
      max-width: 560px;
      margin: 8px auto;
      font-size: 1.03rem;
      line-height: 1.65;
      box-shadow: 0 8px 20px rgba(138, 51, 0, 0.08);
    }

    .locked strong {
      display: block;
      font-size: 1.18rem;
      color: #6d2200;
      margin-bottom: 8px;
    }

    .unlock-btn {
      display: inline-block;
      margin-top: 12px;
      border: none;
      border-radius: 10px;
      background: #f97316;
      color: #fff;
      padding: 11px 18px;
      font-weight: 700;
      text-decoration: none;
    }

    .unlock-btn:hover {
      background: #ea580c;
    }

    .print-row {
      margin-top: 14px;
      padding: 14px;
      display: flex;
      justify-content: center;
    }

    .print-btn {
      border: 1px solid #b9c9df;
      background: #fff;
      color: #1e3a5f;
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s ease;
    }

    .print-btn:hover {
      background: #f4f8ff;
    }

    .view-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .view-toggle-btn {
      flex: 1;
      border: 1px solid #cfd8e3;
      background: #fff;
      color: #1e334a;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .view-toggle-btn.active {
      background: #eaf1ff;
      border-color: #7aa3ee;
      color: #123567;
    }

    .view-section-label {
      margin: 0 0 8px;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      font-size: 1rem;
      color: #142033;
    }

    @media (max-width: 760px) {
      body {
        padding: 20px 12px 40px;
      }

      .form-grid,
      .value-list {
        grid-template-columns: 1fr;
      }

      .generator-card,
      .worksheet-card,
      .value-card {
        padding: 16px;
      }

      .subject-btn {
        flex-basis: 100%;
      }
    }

    @media print {
      .header,
      .value-card,
      .generator-card,
      .print-row {
        display: none;
      }

      body {
        background: #fff;
        padding: 0;
      }

      .worksheet-card {
        border: none;
        box-shadow: none;
        padding: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Help Your Child Pass the STAAR Test</h1>
      <p>Generate real STAAR-style practice in seconds (Grades 3–8)</p>
    </header>

    <section class="value-card" aria-label="Key benefits">
      <ul class="value-list">
        <li><span>✅</span>Aligned to STAAR rigor</li>
        <li><span>💪</span>Builds confidence before test day</li>
        <li><span>⏱️</span>Takes less than 10 minutes</li>
      </ul>
    </section>

    <section class="generator-card" aria-label="Worksheet generator settings">
      <div class="form-grid">
        <div class="field">
          <label for="grade">Grade</label>
          <select id="grade">
            <option>3</option>
            <option>4</option>
            <option>5</option>
            <option>6</option>
            <option>7</option>
            <option>8</option>
          </select>
        </div>

        <div class="field">
          <label>Subject</label>
          <div class="subject-selector" id="subject-selector" role="radiogroup" aria-label="Subject"></div>
          <input type="hidden" id="subject" value="Reading" />
        </div>

        <div class="field">
          <label for="skill">What does your child need help with?</label>
          <select id="skill"></select>
        </div>

        <div class="field">
          <label for="level">Level</label>
          <select id="level">
            <option>Below</option>
            <option>On Level</option>
            <option>Advanced</option>
          </select>
        </div>
      </div>

      <div id="auth-box" style="margin-bottom: 16px;">
        <input id="email" type="email" autocomplete="email" placeholder="Enter email" style="padding:10px; width:100%; margin-bottom:8px;" />
        <input id="password" type="password" autocomplete="current-password" placeholder="Enter password" style="padding:10px; width:100%; margin-bottom:8px;" />

        <button onclick="signUp()" class="generate-btn" style="margin-bottom:6px;">
          Sign Up
        </button>

        <button onclick="signIn()" class="generate-btn">
          Log In
        </button>
      </div>

      <button id="generate-btn" class="generate-btn" onclick="generate()">Generate STAAR Pack</button>
    </section>

    <section class="worksheet-card">
      <div class="view-toggle" id="view-toggle" style="display: none;">
        <button id="student-tab" class="view-toggle-btn active" type="button" onclick="toggleView('student')">Student Practice</button>
        <button id="answer-tab" class="view-toggle-btn" type="button" onclick="toggleView('answer')">Answer Key</button>
      </div>
      <div id="output">Your STAAR practice will appear here...</div>
    </section>

    <div class="print-row">
      <button class="print-btn" onclick="window.print()">Download / Print PDF</button>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://qadfehickkkvirtcnska.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhZGZlaGlja2trdmlydGNuc2thIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTQ0NTcsImV4cCI6MjA5MTIzMDQ1N30.G9YhkEije7yI7rCC2nFfZ5j1btUUIci81VZhLQ48JJ4";
    const GUMROAD_URL = "https://garyverse68.gumroad.com/l/uvqtl";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const subjectSkills = {
      Reading: [
        "Finding the main idea",
        "Making inferences",
        "Understanding theme",
        "Vocabulary in context",
        "Comparing texts"
      ],
      Math: [
        "Word problems",
        "Fractions & decimals",
        "Algebra basics",
        "Geometry",
        "Data & graphs"
      ],
      Science: [
        "Force & motion",
        "Energy",
        "Earth & space",
        "Life science",
        "Scientific thinking"
      ],
      "Social Studies": [
        "History & events",
        "Cause & effect",
        "Geography",
        "Government",
        "Economics"
      ]
    };

    const subjectButtons = {
      Reading: "📚 Reading",
      Math: "➗ Math",
      Science: "🔬 Science",
      "Social Studies": "🌎 Social Studies"
    };
    let currentView = "student";

    function extractSection(text, marker, nextMarker) {
      const markerIndex = text.indexOf(marker);
      if (markerIndex === -1) return "";

      const startIndex = markerIndex + marker.length;
      const endIndex = nextMarker ? text.indexOf(nextMarker, startIndex) : -1;
      const section = endIndex === -1 ? text.slice(startIndex) : text.slice(startIndex, endIndex);
      return section.trim();
    }

    function formatSectionContent(content) {
      if (!content) return "";
      return content
        .replaceAll("Correct Answer:", "<strong>Correct Answer:</strong>")
        .replaceAll("Explanation:", "<strong>Explanation:</strong>")
        .replaceAll("Common Mistake:", "<strong>Common Mistake:</strong>")
        .replaceAll("Parent Tip:", "<strong>Parent Tip:</strong>")
        .replaceAll(/\n/g, "<br>");
    }

    function toggleView(view) {
      const studentSection = document.getElementById("student-section");
      const answerSection = document.getElementById("answer-section");
      const studentTab = document.getElementById("student-tab");
      const answerTab = document.getElementById("answer-tab");

      currentView = view === "answer" ? "answer" : "student";

      if (!studentSection || !answerSection || !studentTab || !answerTab) return;

      const showingStudent = currentView === "student";
      studentSection.style.display = showingStudent ? "block" : "none";
      answerSection.style.display = showingStudent ? "none" : "block";
      studentTab.classList.toggle("active", showingStudent);
      answerTab.classList.toggle("active", !showingStudent);
    }

    function setActiveSubject(subject) {
      document.getElementById("subject").value = subject;
      document.querySelectorAll(".subject-btn").forEach((button) => {
        const isActive = button.dataset.subject === subject;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-checked", isActive ? "true" : "false");
      });
      populateSkills(subject);
    }

    function populateSubjectButtons() {
      const subjectSelector = document.getElementById("subject-selector");
      Object.keys(subjectSkills).forEach((subject) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "subject-btn";
        button.dataset.subject = subject;
        button.setAttribute("role", "radio");
        button.setAttribute("aria-checked", "false");
        button.textContent = subjectButtons[subject] || subject;
        button.addEventListener("click", () => setActiveSubject(subject));
        subjectSelector.appendChild(button);
      });
      setActiveSubject("Reading");
    }

    function populateSkills(subject) {
      const skillSelect = document.getElementById("skill");
      skillSelect.innerHTML = "";

      (subjectSkills[subject] || []).forEach((skill) => {
        const option = document.createElement("option");
        option.value = skill;
        option.textContent = skill;
        skillSelect.appendChild(option);
      });
    }

    async function signUp() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { error } = await supabase.auth.signUp({
        email,
        password
      });

      if (error) {
        alert(error.message);
        return;
      }

      // Auto-login immediately after signup
      const { error: loginError } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (loginError) {
        alert(loginError.message);
      } else {
        alert("Account created!");
        location.reload();
      }
    }

    async function signIn() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        alert(error.message);
      } else {
        alert("Logged in successfully!");
        location.reload();
      }
    }

    async function updateAuthBoxVisibility() {
      const {
        data: { session },
      } = await supabase.auth.getSession();

      if (session) {
        document.getElementById("auth-box").style.display = "none";
      }
    }

    async function generate() {
      const outputDiv = document.getElementById("output");
      const generateBtn = document.getElementById("generate-btn");
      const viewToggle = document.getElementById("view-toggle");
      viewToggle.style.display = "none";

      const {
        data: { session }
      } = await supabase.auth.getSession();

      if (!session) {
        outputDiv.innerHTML = `
          <div class="locked">
            <strong>Please log in first</strong>
          </div>
        `;
        return;
      }

      const { data: profile } = await supabase
        .from("profiles")
        .select("plan, generations_used")
        .eq("id", session.user.id)
        .single();

      if (!profile) {
        outputDiv.innerText = "Could not load your profile. Please try again.";
        return;
      }

      if (profile.plan !== "paid" && profile.generations_used >= 2) {
        outputDiv.innerHTML = `
          <div class="locked">
            <strong>You’ve used your 2 free STAAR packs</strong>
            Most parents see improvement in just 10 minutes a day.

            <br><br>

            <a href="${GUMROAD_URL}" class="unlock-btn" target="_blank" rel="noopener noreferrer">
              Unlock Full Access for $12
            </a>

            <br><br>
            <span style="font-size: 0.9rem; color: #555;">
              Already purchased? Log back in with your email to unlock instantly.
            </span>
          </div>
        `;
        return;
      }

      const grade = document.getElementById("grade").value;
      const subject = document.getElementById("subject").value;
      const skill = document.getElementById("skill").value;
      const level = document.getElementById("level").value;

      generateBtn.disabled = true;
      generateBtn.textContent = "Generating...";
      outputDiv.innerHTML = "Generating your STAAR pack... ⏳";

      try {
        console.log("SESSION:", session);

        const res = await fetch(
          "https://qadfehickkkvirtcnska.supabase.co/functions/v1/bright-worker",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${session.access_token}`,
              apikey: SUPABASE_ANON_KEY
            },
            body: JSON.stringify({
              grade,
              subject,
              skill,
              level
            })
          }
        );

        if (res.status === 403) {
          outputDiv.innerHTML = `
            <div class="locked">
              <strong>You’ve used your 2 free STAAR packs</strong>
              Most parents see improvement in just 10 minutes a day.

              <br><br>

              <a href="${GUMROAD_URL}" class="unlock-btn" target="_blank">
                Unlock Full Access for $12
              </a>
            </div>
          `;
          return;
        }

        const data = await res.json();

        if (!res.ok) {
          outputDiv.innerText = "Error: " + (data.error || "Something went wrong");
          return;
        }

        const rawText = data.text || "";
        const passage = extractSection(rawText, "### PASSAGE OR CONTEXT:", "### QUESTIONS:");
        const questions = extractSection(rawText, "### QUESTIONS:", "### ANSWER KEY:");
        const answerKey = extractSection(rawText, "### ANSWER KEY:", "### PARENT HELP:");
        const parentHelp = extractSection(rawText, "### PARENT HELP:");

        outputDiv.innerHTML = `
          <div class="worksheet">
            <div id="student-section">
              <h4 class="view-section-label">📘 Student Practice</h4>
              <h3>📖 Passage</h3>
              ${formatSectionContent(passage)}
              <h3>❓ Questions</h3>
              ${formatSectionContent(questions)}
            </div>
            <div id="answer-section" style="display: none;">
              <h4 class="view-section-label">🧠 Teacher / Parent Answer Key</h4>
              <p style="font-style: italic; color: #555;">Review answers after your child completes the practice.</p>
              <h3>✅ Answer Key</h3>
              ${formatSectionContent(answerKey)}
              <h3>👨‍👩‍👧 Parent Help</h3>
              ${formatSectionContent(parentHelp)}
            </div>
          </div>
        `;

        viewToggle.style.display = "flex";
        toggleView(currentView);
      } catch (err) {
        outputDiv.innerText = "Error: " + err.message;
      } finally {
        generateBtn.disabled = false;
        generateBtn.textContent = "Generate STAAR Pack";
      }
    }

    window.toggleView = toggleView;
    window.generate = generate;
    window.signUp = signUp;
    window.signIn = signIn;
    populateSubjectButtons();
    updateAuthBoxVisibility();
  </script>
</body>
</html>
