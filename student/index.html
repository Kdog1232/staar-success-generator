<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Student Join</title></head>
<body style='font-family:Inter,sans-serif;max-width:720px;margin:20px auto;padding:16px'>
<h2>Join Live Class</h2>
<input id='code' placeholder='6-digit class code' style='padding:10px;width:100%;margin-bottom:8px'>
<input id='student' placeholder='Your name' style='padding:10px;width:100%;margin-bottom:8px'>
<button id='join' style='padding:10px 14px'>Join</button>
<div id='status' style='margin-top:10px'></div>
<div id='waiting' style='display:none;margin-top:14px;font-weight:600;'>Waiting for teacher to start...</div>
<form id='questions' style='margin-top:14px'></form>
<button id='submit' style='display:none;padding:10px 14px;margin-top:12px'>Submit Answers</button>
<script type='module'>
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const studentSupabase=createClient("https://qadfehickkkvirtcnska.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhZGZlaGlja2trdmlydGNuc2thIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTQ0NTcsImV4cCI6MjA5MTIzMDQ1N30.G9YhkEije7yI7rCC2nFfZ5j1btUUIci81VZhLQ48JJ4");
let currentSession=null;let hasSubmitted=false;let sessionStatusChannel=null;
async function joinSession(code, studentName){const {data:session,error}=await studentSupabase.from("sessions").select("id,lesson_id,code,is_active,status").eq("code",code).eq("is_active",true).single();if(error||!session)throw new Error("Session not found or ended.");const {error:joinError}=await studentSupabase.from("participants").insert({session_id:session.id,student_name:studentName});if(joinError)throw joinError;return session;}
function subscribeToSessionStatus(sessionId){if(sessionStatusChannel) studentSupabase.removeChannel(sessionStatusChannel);sessionStatusChannel=studentSupabase.channel(`session-${sessionId}`).on("postgres_changes",{event:"UPDATE",schema:"public",table:"sessions",filter:`id=eq.${sessionId}`},async(payload)=>{if(payload?.new?.status!=="live"||!currentSession)return;const {data:lesson,error}=await studentSupabase.from("lessons").select("data").eq("id",currentSession.lesson_id).single();if(error||!lesson)return;renderQuestions(lesson);document.getElementById("status").textContent="Class is live. Answer all questions.";}).subscribe();}
function renderQuestions(lesson){const qf=document.getElementById("questions");const submitBtn=document.getElementById("submit");const waiting=document.getElementById("waiting");const practice=lesson?.data?.practice?.questions||[];const cross=lesson?.data?.cross?.questions||[];qf.innerHTML=`<h3>Practice</h3>${practice.map((q,i)=>`<div style='border:1px solid #ddd;padding:10px;margin:8px 0'><p><b>${i+1}.</b> ${q.question||""}</p>${(q.choices||[]).map((c,idx)=>`<label style='display:block'><input type='radio' name='p${i}' value='${String.fromCharCode(65+idx)}'> ${String.fromCharCode(65+idx)}. ${typeof c==='string'?c:(c?.text||'')}</label>`).join('')}</div>`).join("")}<h3>Cross</h3>${cross.map((q,i)=>`<div style='border:1px solid #ddd;padding:10px;margin:8px 0'><p><b>${i+1}.</b> ${q.question||""}</p>${(q.choices||[]).map((c,idx)=>`<label style='display:block'><input type='radio' name='c${i}' value='${String.fromCharCode(65+idx)}'> ${String.fromCharCode(65+idx)}. ${typeof c==='string'?c:(c?.text||'')}</label>`).join('')}</div>`).join("")}`;waiting.style.display="none";submitBtn.style.display='inline-block';submitBtn.disabled=false;}
document.getElementById('join').onclick=async()=>{const code=document.getElementById('code').value.trim();const student=document.getElementById('student').value.trim();const status=document.getElementById('status');const waiting=document.getElementById('waiting');status.textContent='Joining…';try{if(!code||!student){status.textContent='Enter code and name.';return;}if(hasSubmitted){status.textContent='You already submitted. Wait for your teacher.';return;}const session=await joinSession(code,student);currentSession={id:session.id,lesson_id:session.lesson_id,student};subscribeToSessionStatus(session.id);if(session.status==="lobby"){waiting.style.display="block";status.textContent='Joined. Waiting room open.';return;}const {data:lesson,error:lessonError}=await studentSupabase.from('lessons').select('data').eq('id',session.lesson_id).single();if(lessonError||!lesson){status.textContent='No questions available.';return;}renderQuestions(lesson);status.textContent='Class is live. Answer all questions.';}catch(e){console.error(e);status.textContent=e.message||'Something went wrong. Try again.';}};
document.getElementById('submit').onclick=async()=>{const submitBtn=document.getElementById('submit');const status=document.getElementById('status');if(!currentSession||hasSubmitted)return;submitBtn.disabled=true;submitBtn.textContent='Submitting...';try{const answers={};document.querySelectorAll('input[type=radio]:checked').forEach((input)=>{answers[input.name]=input.value;});await studentSupabase.from("responses").insert({session_id:currentSession.id,student_name:currentSession.student,answers});hasSubmitted=true;document.querySelectorAll('input').forEach(i=>i.disabled=true);status.innerHTML='✅ Submitted!<br>Wait for your teacher’s instructions.';submitBtn.textContent='Submitted';}catch(e){console.error(e);status.textContent='Submit failed. Try again.';submitBtn.disabled=false;submitBtn.textContent='Submit Answers';}};
</script></body></html>
