<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Student Join</title></head>
<body style='font-family:Inter,sans-serif;max-width:720px;margin:20px auto;padding:16px'>
<h2>Join Live Class</h2>
<input id='code' placeholder='6-digit class code' style='padding:10px;width:100%;margin-bottom:8px'>
<input id='student' placeholder='Your name' style='padding:10px;width:100%;margin-bottom:8px'>
<button id='join-btn' style='padding:10px 14px'>Join</button>
<div id='status' style='margin-top:10px'></div>
<div id='waiting' style='display:none;margin-top:14px;font-weight:600;'>Waiting for teacher to start...</div>
<form id='questions' style='margin-top:14px'></form>
<button id='submit' style='display:none;padding:10px 14px;margin-top:12px'>Submit Answers</button>
<script type='module'>
console.log("🔥 SCRIPT LOADED");
window.addEventListener("error", (e) => {
  console.error("GLOBAL ERROR:", e.error || e.message);
});

window.addEventListener("unhandledrejection", (e) => {
  console.error("PROMISE ERROR:", e.reason);
});
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const SUPABASE_URL="https://qadfehickkkvirtcnska.supabase.co";const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhZGZlaGlja2trdmlydGNuc2thIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTQ0NTcsImV4cCI6MjA5MTIzMDQ1N30.G9YhkEije7yI7rCC2nFfZ5j1btUUIci81VZhLQ48JJ4";const studentSupabase=createClient(SUPABASE_URL,SUPABASE_ANON_KEY,{auth:{persistSession:false},global:{fetch:(url,options)=>{console.log("🌐 FETCH:",{url,options});return fetch(url,options);}}});
let currentSession=null;let hasSubmitted=false;let sessionStatusChannel=null;let sessionStatusInterval=null;let lessonStarted=false;
async function joinSession(code, studentName){const joinTraceId=`join-${Date.now()}-${Math.random().toString(36).slice(2,8)}`;console.log("[joinSession] START",{joinTraceId,code,studentName});try{console.log("[joinSession] BEFORE session lookup",{joinTraceId,code});const {data:session,error:sessionError,status:sessionStatus,statusText:sessionStatusText}=await studentSupabase.from("sessions").select("id,lesson_id,code,is_active,status,allow_join").eq("code",code).single();console.log("[joinSession] AFTER session lookup",{joinTraceId,session,sessionError,sessionStatus,sessionStatusText});if(sessionError){console.error("[joinSession] Session lookup failed",{joinTraceId,sessionError,code});throw new Error(`Session lookup failed (${sessionError.message||"unknown error"}).`);}if(!session){console.error("[joinSession] Session lookup returned null",{joinTraceId,code});throw new Error("Session not found.");}const {data:{session:authSession},error:authError}=await studentSupabase.auth.getSession();if(authError){console.error("[joinSession] Auth session check failed",{joinTraceId,authError});throw new Error(`Auth session check failed (${authError.message||"unknown error"}).`);}if(!authSession){console.warn("[joinSession] No authenticated Supabase session (anon user)",{joinTraceId});}console.log("🔥 ABOUT TO INSERT PARTICIPANT",{joinTraceId,sessionCode:session.code,studentName});const insertAbortController=new AbortController();const insertTimeoutId=setTimeout(()=>insertAbortController.abort("Join insert timed out after 5000ms."),5000);console.log("[joinSession] BEFORE insert",{joinTraceId,sessionCode:session.code,studentName});const {data:joinData,error:joinError,status:joinStatus,statusText:joinStatusText}=await studentSupabase.from("participants").insert([{session_id:session.id,session_code:session.code,student_name:studentName}]).select("id,session_id,session_code,student_name,joined_at").abortSignal(insertAbortController.signal);clearTimeout(insertTimeoutId);console.log("[joinSession] AFTER insert",{joinTraceId,joinData,joinError,joinStatus,joinStatusText});if(joinError){const errorMessage=(joinError.message||"").toLowerCase();const details=(joinError.details||"").toLowerCase();const hint=(joinError.hint||"").toLowerCase();const isRlsLikely=errorMessage.includes("row-level security")||details.includes("row-level security")||hint.includes("policy")||joinError.code==="42501";if(isRlsLikely){console.error("[joinSession] RLS rejection while inserting participant",{joinTraceId,joinError});throw new Error(`Join rejected by RLS policy (${joinError.message||"policy denied"}).`);}console.error("[joinSession] Participant insert failed",{joinTraceId,joinError});throw new Error(`Unable to join session (${joinError.message||"insert failed"}).`);}console.log("[joinSession] SUCCESS",{joinTraceId,participant:joinData});return session;}catch(err){const maybeNetworkOffline=typeof navigator!=="undefined"&&navigator&&navigator.onLine===false;console.error("[joinSession] CATCH",{joinTraceId,error:err,networkOffline:maybeNetworkOffline});if(maybeNetworkOffline){throw new Error("Network appears offline. Check connection and try again.");}if(err instanceof Error&&err.name==="AbortError"){throw new Error("Join insert timed out after 5000ms.");}if(err instanceof Error){throw err;}throw new Error("Unknown join error.");}finally{console.log("[joinSession] FINALLY",{joinTraceId,code,studentName});}}
async function startStudentLesson(){if(lessonStarted||!currentSession)return;lessonStarted=true;clearSessionStatusPolling();const {data:lessonRow,error}=await studentSupabase.from("lessons").select("data").eq("id",currentSession.lesson_id).maybeSingle();const lessonData=extractLessonData(lessonRow);console.log("LESSON LOOKUP:",{lessonRow,lessonData,error,currentSession});if(error||!lessonData){lessonStarted=false;document.getElementById("status").textContent="No questions available.";return;}if(renderQuestions(lessonData)!==false){document.getElementById("status").textContent="Class is live. Answer all questions.";}}
function clearSessionStatusPolling(){if(sessionStatusInterval){clearInterval(sessionStatusInterval);sessionStatusInterval=null;}}
async function checkSessionStatus(){if(!currentSession||lessonStarted)return;const {data:session,error}=await studentSupabase.from("sessions").select("status").eq("code",currentSession.code).single();if(error){console.error("[checkSessionStatus] Session status lookup failed",{error,currentSession});return;}console.log("SESSION STATUS CHECK:",session);if(session?.status==="live"){await startStudentLesson();}}
function subscribeToSessionStatus(code){if(sessionStatusChannel) studentSupabase.removeChannel(sessionStatusChannel);clearSessionStatusPolling();sessionStatusChannel=studentSupabase.channel(`session-${code}`).on("postgres_changes",{event:"UPDATE",schema:"public",table:"sessions",filter:`code=eq.${code}`},(payload)=>{console.log("SESSION UPDATE:",payload);if(payload.new?.status==="live"){startStudentLesson();}}).subscribe((status)=>{console.log("SESSION CHANNEL STATUS:",status);});sessionStatusInterval=setInterval(checkSessionStatus,2000);}
function extractLessonData(lesson){let data=lesson?.lesson?.data||lesson?.data||lesson;if(typeof data==="string"){try{data=JSON.parse(data);}catch(parseError){console.error("Unable to parse lesson data JSON",parseError);return null;}}return data&&typeof data==="object"?data:null;}
function getQuestionSection(data,sectionName){const section=data?.[sectionName]||{};return {passage:section?.passage||"",questions:Array.isArray(section?.questions)?section.questions:[]};}
function renderQuestions(lesson){const qf=document.getElementById("questions");const submitBtn=document.getElementById("submit");const waiting=document.getElementById("waiting");const status=document.getElementById("status");const data=extractLessonData(lesson);const practiceSection=getQuestionSection(data,"practice");const crossSection=getQuestionSection(data,"cross");const practice=practiceSection.questions;const cross=crossSection.questions;const practicePassage=practiceSection.passage||data?.passage||"";const crossPassage=crossSection.passage||"";console.log("RENDER LESSON DATA:",{data,practiceQuestions:practice.length,crossQuestions:cross.length,practicePassage:!!practicePassage,crossPassage:!!crossPassage});if(!practice.length&&!cross.length){qf.innerHTML="";submitBtn.style.display="none";submitBtn.disabled=true;status.textContent="No questions available.";return false;}const passageHtml=(title,passage)=>passage?`<section style='border:1px solid #cfd8e3;background:#f8fafc;padding:12px;margin:10px 0'><h3>${title}</h3><div style='white-space:pre-wrap;line-height:1.5'>${passage}</div></section>`:"";qf.innerHTML=`${passageHtml("Practice Passage",practicePassage)}<h3>Practice Questions</h3>${practice.map((q,i)=>`<div style='border:1px solid #ddd;padding:10px;margin:8px 0'><p><b>${i+1}.</b> ${q.question||""}</p>${(q.choices||[]).map((c,idx)=>`<label style='display:block'><input type='radio' name='p${i}' value='${String.fromCharCode(65+idx)}'> ${String.fromCharCode(65+idx)}. ${typeof c==='string'?c:(c?.text||'')}</label>`).join('')}</div>`).join("")}${passageHtml("Cross-Curricular Passage",crossPassage)}<h3>Cross-Curricular Questions</h3>${cross.map((q,i)=>`<div style='border:1px solid #ddd;padding:10px;margin:8px 0'><p><b>${i+1}.</b> ${q.question||""}</p>${(q.choices||[]).map((c,idx)=>`<label style='display:block'><input type='radio' name='c${i}' value='${String.fromCharCode(65+idx)}'> ${String.fromCharCode(65+idx)}. ${typeof c==='string'?c:(c?.text||'')}</label>`).join('')}</div>`).join("")}`;waiting.style.display="none";submitBtn.style.display='inline-block';submitBtn.disabled=false;return true;}
document.addEventListener("DOMContentLoaded", () => {
const joinBtn=document.getElementById("join-btn");
joinBtn.addEventListener("click",async()=>{const codeInput=document.getElementById("code");const studentInput=document.getElementById("student");const status=document.getElementById("status");const waiting=document.getElementById("waiting");if(!codeInput||!studentInput){console.error("❌ Inputs not found in DOM");alert("Page error. Refresh and try again.");return;}const code=codeInput.value.trim();const student=studentInput.value.trim();console.log("🚀 JOIN CLICKED",{code,name:student});if(!code||!student){alert("Enter code and name");status.textContent="Enter code and name.";return;}if(hasSubmitted){status.textContent='You already submitted. Wait for your teacher.';return;}joinBtn.disabled=true;joinBtn.textContent="Joining...";status.textContent="Joining...";try{const session=await joinSession(code,student);currentSession={id:session.id,lesson_id:session.lesson_id,code:session.code,student};lessonStarted=false;subscribeToSessionStatus(session.code);if(session.status==="lobby"){waiting.style.display="block";status.textContent='Joined. Waiting for teacher to start.';alert("✅ Joined!");return;}await startStudentLesson();alert("✅ Joined!");}catch(err){console.error("❌ JOIN FAILED:",err);status.textContent=err.message||"Something went wrong. Try again.";alert(err.message||"Join failed.");}finally{joinBtn.disabled=false;joinBtn.textContent="Join";}});
document.getElementById('submit').onclick=async()=>{const submitBtn=document.getElementById('submit');const status=document.getElementById('status');if(!currentSession||hasSubmitted)return;submitBtn.disabled=true;submitBtn.textContent='Submitting...';try{const answers={};document.querySelectorAll('input[type=radio]:checked').forEach((input)=>{answers[input.name]=input.value;});await studentSupabase.from("responses").insert({session_id:currentSession.id,student_name:currentSession.student,answers});hasSubmitted=true;document.querySelectorAll('input').forEach(i=>i.disabled=true);status.innerHTML='✅ Submitted!<br>Wait for your teacher’s instructions.';submitBtn.textContent='Submitted';}catch(e){console.error(e);status.textContent='Submit failed. Try again.';submitBtn.disabled=false;submitBtn.textContent='Submit Answers';}};
});
</script></body></html>
