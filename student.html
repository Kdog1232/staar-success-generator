<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Student Join</title></head>
<body style='font-family:Inter,sans-serif;max-width:720px;margin:20px auto;padding:16px'>
<h2>Join Live Class</h2>
<input id='code' placeholder='6-digit class code' style='padding:10px;width:100%;margin-bottom:8px'>
<input id='student' placeholder='Your name' style='padding:10px;width:100%;margin-bottom:8px'>
<button id='join' style='padding:10px 14px'>Join</button>
<div id='status' style='margin-top:10px'></div>
<form id='questions' style='margin-top:14px'></form>
<button id='submit' style='display:none;padding:10px 14px;margin-top:12px'>Submit Answers</button>
<script type='module'>
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const supabase=createClient("https://qadfehickkkvirtcnska.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhZGZlaGlja2trdmlydGNuc2thIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTQ0NTcsImV4cCI6MjA5MTIzMDQ1N30.G9YhkEije7yI7rCC2nFfZ5j1btUUIci81VZhLQ48JJ4");
let currentSession=null;
let hasSubmitted=false;
async function submitAnswers(sessionId, studentName, answers){await supabase.from("responses").insert({session_id:sessionId,student_name:studentName,answers});}
document.getElementById('join').onclick=async()=>{const code=document.getElementById('code').value.trim();const student=document.getElementById('student').value.trim().toLowerCase();const status=document.getElementById('status');const qf=document.getElementById('questions');const submitBtn=document.getElementById('submit');status.textContent='Joining…';try{if(!code||!student){status.textContent='Enter code and name.';return;}if(hasSubmitted){status.textContent='You already submitted. Wait for your teacher.';return;}const {data:session,error:sessionError}=await supabase.from('sessions').select('id,lesson_id').eq('code',code).eq('is_active',true).single();if(sessionError||!session){status.textContent='Session not found or ended.';return;}const {data:lesson,error:lessonError}=await supabase.from('lessons').select('data').eq('id',session.lesson_id).single();if(lessonError||!lesson){status.textContent='No questions available.';return;}const questions=lesson?.data?.practice?.questions||[];if(!questions.length){status.textContent='No questions available.';return;}currentSession={id:session.id,student,questions};qf.innerHTML=questions.map((q,i)=>`<div style='border:1px solid #ddd;padding:10px;margin:8px 0'><p><b>${i+1}.</b> ${q.question||''}</p>${(q.choices||[]).map((c,idx)=>`<label style='display:block'><input type='radio' name='q${i}' value='${String.fromCharCode(65+idx)}'> ${String.fromCharCode(65+idx)}. ${typeof c==='string'?c:(c?.text||'')}</label>`).join('')}</div>`).join('');submitBtn.style.display='inline-block';submitBtn.disabled=false;submitBtn.textContent='Submit Answers';status.textContent='You’re in! Answer all questions, then click Submit.';}catch(e){console.error(e);status.textContent='Something went wrong. Try again.';}};
document.getElementById('submit').onclick=async()=>{const submitBtn=document.getElementById('submit');const status=document.getElementById('status');const qf=document.getElementById('questions');if(!currentSession||hasSubmitted)return;submitBtn.disabled=true;submitBtn.textContent='Submitting...';try{const answers={};for(let i=0;i<currentSession.questions.length;i++){const checked=document.querySelector(`input[name='q${i}']:checked`);if(!checked){alert(\"Answer all questions before submitting.\");submitBtn.disabled=false;submitBtn.textContent='Submit Answers';return;}answers[String(i)]=checked.value;}await submitAnswers(currentSession.id,currentSession.student,answers);hasSubmitted=true;qf.querySelectorAll('input').forEach(i=>i.disabled=true);status.innerHTML='✅ Submitted!<br>Wait for your teacher’s instructions.';submitBtn.textContent='Submitted';}catch(e){console.error(e);status.textContent='Submit failed. Try again.';submitBtn.disabled=false;submitBtn.textContent='Submit Answers';}};
</script></body></html>
